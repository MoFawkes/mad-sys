name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dotnet:
    name: Windows build and tests
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AqiClock.sln --configfile NuGet.Config

      - name: Build
        run: dotnet build AqiClock.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AqiClock.sln --configuration Release --no-build --no-restore

  supabase:
    name: Supabase migrations and seed
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Start local Supabase
        run: supabase start

      - name: Reset database from scratch
        run: supabase db reset --local --yes

      - name: Prove migrations and seed are repeatable
        run: supabase db reset --local --yes
